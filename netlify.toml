[build]
  command = "npm run build"
  publish = "dist"

# Google Search Console — “Page with redirect” is often caused by:
# - Sitemap/canonicals using http:// while the live site is https:// (build normalizes http→https for production).
# - www vs apex mismatch: set Netlify primary domain, then set VITE_SITE_URL to that EXACT host
#   (same URL-prefix property in Search Console). The non-primary host will redirect — don’t list it in sitemap.
#
# VITE_* values are public (injected into HTML/JS). Netlify still treats matching env values as
# secrets unless we exclude these keys from the scan.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SITE_URL,VITE_GOOGLE_SITE_VERIFICATION"

# Static files in dist (e.g. dist/blog/<slug>/index.html) are served first.
# SPA fallback for routes without a matching file.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Helps crawlers parse robots.txt reliably (some tools are picky about Content-Type).
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
